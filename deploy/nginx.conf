server {
    listen 80;
    server_name hydra.example.com;  # <-- deine Domain anpassen

    # Certbot/HTTPS: dieser Block wird von certbot automatisch ersetzt
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name hydra.example.com;  # <-- deine Domain anpassen

    # SSL (von certbot gesetzt oder manuell)
    ssl_certificate     /etc/letsencrypt/live/hydra.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hydra.example.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sicherheits-Header
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options            DENY                                  always;
    add_header X-Content-Type-Options     nosniff                               always;
    add_header Referrer-Policy            no-referrer                           always;

    # Frontend: statische Dateien
    root  /var/www/hydra;
    index index.html;

    # API → Backend-Container
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA-Fallback: alle anderen Routen → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
